name: Normalizar usuário de captura

on:
  workflow_dispatch:
    inputs:
      oldUser:
        description: "Usuário antigo"
        required: true
        default: "Marcelo-Silva"
      newUser:
        description: "Usuário novo"
        required: true
        default: "SILVA"

jobs:
  normalize:
    name: Atualizar autoria de oportunidades
    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Validar containers
        run: |
          docker compose ps

      - name: Normalizar usuário no banco
        env:
          OLD_USER: ${{ inputs.oldUser }}
          NEW_USER: ${{ inputs.newUser }}
        run: |
          docker compose exec -T -e OLD_USER -e NEW_USER backend node -e '
            const { Sequelize, QueryTypes } = require("sequelize");

            const oldUser = process.env.OLD_USER;
            const newUser = process.env.NEW_USER;

            const pickFirstNonEmpty = (...values) => {
              for (const value of values) {
                if (typeof value === "string") {
                  const trimmed = value.trim().replace(/^(["\"])|(["\"])$/g, "");
                  if (trimmed.length > 0) return trimmed;
                }
              }
              return undefined;
            };

            const decodeBase64 = (value) => {
              if (!value) return undefined;
              try {
                return Buffer.from(String(value).trim(), "base64").toString("utf-8");
              } catch {
                return undefined;
              }
            };

            if (!oldUser || !newUser) {
              throw new Error("OLD_USER e NEW_USER são obrigatórios.");
            }

            const dbHost = pickFirstNonEmpty(
              process.env.DB_HOST,
              process.env.ERP_FLEX_SQLSERVER_HOST,
              process.env.SQLSERVER_HOST,
            );
            const dbPort = pickFirstNonEmpty(
              process.env.DB_PORT,
              process.env.ERP_FLEX_SQLSERVER_PORT,
              process.env.SQLSERVER_PORT,
              "1433",
            );
            const dbDatabase = pickFirstNonEmpty(
              process.env.DB_DATABASE,
              process.env.ERP_FLEX_SQLSERVER_DATABASE,
              process.env.SQLSERVER_DATABASE,
            );
            const dbUsername = pickFirstNonEmpty(
              process.env.DB_USER,
              process.env.ERP_FLEX_SQLSERVER_USERNAME,
              process.env.SQLSERVER_USERNAME,
            );
            const dbPassword =
              decodeBase64(process.env.DB_PASSWORD_B64 || process.env.ERP_FLEX_SQLSERVER_PASSWORD_B64) ||
              pickFirstNonEmpty(
                process.env.DB_PASSWORD,
                process.env.ERP_FLEX_SQLSERVER_PASSWORD,
                process.env.SQLSERVER_PASSWORD,
              ) ||
              "";

            const sequelize = new Sequelize(
              dbDatabase || "",
              dbUsername || "",
              dbPassword,
              {
                dialect: "mssql",
                host: dbHost || "",
                port: Number(dbPort),
                logging: false,
                dialectOptions: {
                  options: {
                    encrypt: (pickFirstNonEmpty(process.env.DB_ENCRYPT, process.env.SQLSERVER_ENCRYPT, "false") || "false") === "true",
                    trustServerCertificate:
                      (pickFirstNonEmpty(
                        process.env.DB_TRUST_SERVER_CERTIFICATE,
                        process.env.SQLSERVER_TRUST_SERVER_CERTIFICATE,
                        "true",
                      ) || "true") === "true",
                  },
                },
              },
            );

            (async () => {
              await sequelize.authenticate();

              const [before] = await sequelize.query(
                "SELECT COUNT(1) AS total FROM ConstructionOpportunity WHERE createdByUserId = :oldUser OR updatedByUserId = :oldUser",
                {
                  replacements: { oldUser },
                  type: QueryTypes.SELECT,
                },
              );

              const beforeTotal = Number(before?.total || 0);
              console.log(`[normalize-user] Encontrados ${beforeTotal} registros para ${oldUser}`);

              if (beforeTotal === 0) {
                console.log("[normalize-user] Nenhuma alteração necessária.");
                await sequelize.close();
                return;
              }

              await sequelize.query(
                `UPDATE ConstructionOpportunity
                 SET createdByUserId = CASE WHEN createdByUserId = :oldUser THEN :newUser ELSE createdByUserId END,
                     updatedByUserId = CASE WHEN updatedByUserId = :oldUser THEN :newUser ELSE updatedByUserId END,
                     updatedAt = SYSUTCDATETIME()
                 WHERE createdByUserId = :oldUser OR updatedByUserId = :oldUser`,
                {
                  replacements: { oldUser, newUser },
                  type: QueryTypes.UPDATE,
                },
              );

              const [after] = await sequelize.query(
                "SELECT COUNT(1) AS total FROM ConstructionOpportunity WHERE createdByUserId = :oldUser OR updatedByUserId = :oldUser",
                {
                  replacements: { oldUser },
                  type: QueryTypes.SELECT,
                },
              );

              const [newCount] = await sequelize.query(
                "SELECT COUNT(1) AS total FROM ConstructionOpportunity WHERE createdByUserId = :newUser OR updatedByUserId = :newUser",
                {
                  replacements: { newUser },
                  type: QueryTypes.SELECT,
                },
              );

              console.log(`[normalize-user] Restantes com ${oldUser}: ${Number(after?.total || 0)}`);
              console.log(`[normalize-user] Registros com ${newUser}: ${Number(newCount?.total || 0)}`);

              await sequelize.close();
            })().catch(async (err) => {
              console.error(err);
              try {
                await sequelize.close();
              } catch {
                // noop
              }
              process.exit(1);
            });
          '
