# ---------------------------------------------------------------------------
# projetos.reymaster.com.br - HTTP -> HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name projetos.reymaster.com.br;

    return 301 https://projetos.reymaster.com.br$request_uri;
}

upstream dw_comercial_backend {
    server dw-comercial-backend:3001;
    keepalive 32;
}

upstream dw_comercial_frontend {
    server dw-comercial-frontend:80;
    keepalive 32;
}

upstream fx_core_frontend {
    server fx-core-web:80;
    keepalive 32;
}

upstream analytics_backend {
    server analytics-backend-node:3001;
    keepalive 32;
}

upstream analytics_frontend {
    server analytics-frontend:80;
    keepalive 32;
}

upstream fx_obras_backend {
    server fx-obras-backend:3333;
    keepalive 32;
}

upstream fx_obras_frontend {
    server fx-obras-frontend:80;
    keepalive 32;
}

