server {
    listen 80 default_server;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ---- /inovacao/dw-comercial ----
    location = /inovacao/dw-comercial {
        return 301 /inovacao/dw-comercial/;
    }
    

    location /inovacao/dw-comercial/api/ {
        proxy_pass http://dw_comercial_backend/api/;
