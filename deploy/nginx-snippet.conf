# Adicione estes blocos no nginx central do servidor (junto aos demais apps em /inovacao).
# Tambem inclua os upstreams no final do arquivo de configuracao.

# ---- /inovacao/fx-obras ----
location = /inovacao/fx-obras {
    return 301 /inovacao/fx-obras/;
}

location /inovacao/fx-obras/api/ {
    proxy_pass http://fx_obras_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location /inovacao/fx-obras/uploads/ {
    proxy_pass http://fx_obras_backend/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location = /inovacao/fx-obras/health {
    proxy_pass http://fx_obras_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /inovacao/fx-obras/ {
    proxy_pass http://fx_obras_frontend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Upstreams (fora dos blocos server)
upstream fx_obras_backend {
    server fx-obras-backend:3333;
    keepalive 32;
}

upstream fx_obras_frontend {
    server fx-obras-frontend:80;
    keepalive 32;
}
